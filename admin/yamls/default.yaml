agent:
  name: TakenokoAI
  version: 0.1.0
  log_dir: logs
  log_level: DEBUG

families:
  Re:
    model: gpt-4o
    temperature: 0.7
    max_tokens: 4096
    prompt: prompts/reaction/re_default.md
  Pr:
    model: gpt-4o
    temperature: 0.5
    max_tokens: 8192
    prompt: prompts/prediction/pr_default.md
  Ev:
    model: gpt-4o
    temperature: 0.3
    max_tokens: 4096
    prompt: prompts/evaluation/ev_default.md
  Me:
    model: gpt-4o
    temperature: 0.2
    max_tokens: 4096
    prompt: prompts/memorization/me_default.md
  Mo:
    model: gpt-4o
    temperature: 0.7
    max_tokens: 2048
    prompt: prompts/motion/mo_default.md

resources:
  max_tokens_per_family: -1
  max_thinking_time_ms: -1
  max_ram_bytes: -1
  max_queue_length: 100
