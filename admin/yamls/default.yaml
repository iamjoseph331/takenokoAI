agent:
  name: TakenokoAI
  version: 0.1.0
  log_dir: logs
  log_level: DEBUG
  self_model_path: self.md
  character_path: prompts/characters/character.md
  # When true, every LLM call logs the full assembled prompt + response body
  # to each family's logger. Per-family override: families.<prefix>.verbose.
  verbose: false

families:
  Re:
    model: ollama/gemma4
    temperature: 0.7
    max_tokens: 4096
    identity_prompt: prompts/identity/re_identity.md
    rulebook: reaction/re_rulebook.md
  Pr:
    model: ollama/gemma4
    temperature: 0.5
    max_tokens: 8192
    identity_prompt: prompts/identity/pr_identity.md
    rulebook: prediction/pr_rulebook.md
  Ev:
    model: ollama/gemma4
    temperature: 0.3
    max_tokens: 4096
    identity_prompt: prompts/identity/ev_identity.md
    rulebook: evaluation/ev_rulebook.md
  Me:
    model: ollama/gemma4
    temperature: 0.2
    max_tokens: 4096
    identity_prompt: prompts/identity/me_identity.md
    rulebook: memorization/me_rulebook.md
  Mo:
    model: ollama/gemma4
    temperature: 0.7
    max_tokens: 2048
    identity_prompt: prompts/identity/mo_identity.md
    rulebook: motion/mo_rulebook.md

resources:
  max_tokens_per_family: -1
  max_thinking_time_ms: -1
  max_ram_bytes: -1
  max_queue_length: 100
  queue_limits:
    Pr: 10
    Re: 5
    Ev: 5
    Me: 5
    Mo: 5

# Submodules: decoupled from main modules, depend only on interfaces.
# Set enabled: true to activate. Policy: WAIT | RETRY | DROP.
submodules:
  Re:
    browser:
      enabled: false
      policy: WAIT
    audio:
      enabled: false
      policy: RETRY
      max_retries: 3
      stt: {}
  Mo:
    browser:
      enabled: false
      policy: WAIT
    audio:
      enabled: false
      policy: DROP
      tts: {}
  Me:
    rules:
      enabled: false
      policy: WAIT

api_key_envs:
  openai: TAKENOKO_OPENAI_KEY
  anthropic: TAKENOKO_ANTHROPIC_KEY
  ollama: TAKENOKO_OLLAMA_KEY